version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: resume-analyzer-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: resume_analyzer

  app:
    build: .
    container_name: resume-analyzer-app
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: "mongodb://mongodb:27017/resume_analyzer"
      JWT_SECRET: "${JWT_SECRET:-change-this-secret-in-production}"
      JWT_EXPIRES_IN: "7d"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      GROQ_MODEL: "llama-3.3-70b-versatile"
      CLIENT_URL: "http://localhost:3000"
      UPLOAD_DIR: "./uploads"
      MAX_FILE_SIZE: 5242880
    volumes:
      - uploads_data:/app/server/uploads

volumes:
  mongodb_data:
  uploads_data:
